name: Release Please & Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish or repair
        required: true
        type: string

permissions:
  contents: write
  issues: write
  id-token: write
  pull-requests: write

jobs:
  validate:
    name: Quality Validations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Restore custom-gcl cache
        id: custom-gcl-cache
        uses: actions/cache@v6
        with:
          path: custom-gcl
          key: custom-gcl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.custom-gcl.yml', '.mise.toml') }}

      - name: Lint
        if: steps.custom-gcl-cache.outputs.cache-hit != 'true'
        run: mise run lint

      - name: Lint with cached custom-gcl
        if: steps.custom-gcl-cache.outputs.cache-hit == 'true'
        run: |
          chmod +x ./custom-gcl
          ./custom-gcl run ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run tests
        run: mise run test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    needs:
      - test
      - validate
    if: github.event_name == 'push'

    steps:
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}

  goreleaser:
    name: GoReleaser Build & Publish
    runs-on: ubuntu-latest
    needs:
      - release-please
      - test
      - validate

    if: >-
      always() &&
      needs.test.result == 'success' &&
      needs.validate.result == 'success' &&
      (
        (github.event_name == 'push' && needs.release-please.outputs.release_created == 'true') ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || needs.release-please.outputs.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release --clean --config .goreleaser.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

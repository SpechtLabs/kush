name: CI Build & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**.md"
      - .github/workflows/docs-website.yaml
      - .github/workflows/validations.yaml
      - .github/workflows/release.yaml
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**.md"
      - .github/workflows/docs-website.yaml
      - .github/workflows/validations.yaml

permissions:
  contents: read

jobs:
  validate:
    name: Quality Validations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v2

      # Builds ./custom-gcl (golangci-lint + golint-sl) and runs it. The golint-sl
      # plugin and the gofmt/goimports formatters are both applied here.
      - name: Lint
        run: mise run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up mise
        uses: jdx/mise-action@v2

      - name: Run tests
        run: mise run test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  build:
    name: Build with GoReleaser
    runs-on: ubuntu-latest
    needs:
      - test
      - validate

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v6
        with:
          args: check

      - name: Build with GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v6
        with:
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

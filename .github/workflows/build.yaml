name: CI Build & Test

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**.md"
      - .github/workflows/docs-website.yaml
      - .github/workflows/validations.yaml
      - .github/workflows/release.yaml
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths-ignore:
      - docs/**
      - "**.md"
      - .github/workflows/docs-website.yaml
      - .github/workflows/validations.yaml

permissions:
  contents: read

jobs:
  validate:
    name: Quality Validations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Restore custom-gcl cache
        id: custom-gcl-cache
        uses: actions/cache@v6
        with:
          path: custom-gcl
          key: custom-gcl-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('.custom-gcl.yml', '.mise.toml') }}

      # Builds ./custom-gcl (golangci-lint + golint-sl) and runs it. The golint-sl
      # plugin and the gofmt/goimports formatters are both applied here.
      - name: Lint
        if: steps.custom-gcl-cache.outputs.cache-hit != 'true'
        run: mise run lint

      - name: Lint with cached custom-gcl
        if: steps.custom-gcl-cache.outputs.cache-hit == 'true'
        run: |
          chmod +x ./custom-gcl
          ./custom-gcl run ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up mise
        uses: jdx/mise-action@v4

      - name: Run tests
        run: mise run test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  nix:
    name: Nix Flake
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Check Flake
        run: nix flake check

      - name: Build Flake Package
        run: nix build

  build:
    name: Build with GoReleaser
    runs-on: ubuntu-latest
    needs:
      - test
      - validate
      - nix

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: "go.mod"
          cache: true
          cache-dependency-path: "**/*.sum"

      - name: Validate GoReleaser config
        uses: goreleaser/goreleaser-action@v7
        with:
          args: check

      - name: Build with GoReleaser (snapshot)
        uses: goreleaser/goreleaser-action@v7
        with:
          args: build --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

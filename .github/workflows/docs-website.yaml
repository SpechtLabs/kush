name: Documentation

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - docs/**/*
      - .github/workflows/docs-website.yaml
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
    paths:
      - docs/**/*
      - .github/workflows/docs-website.yaml

jobs:
  md:
    name: Markdown
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          globs: "docs/**/*.md"

  build:
    runs-on: ubuntu-latest
    name: Build (Docs)
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Dependencies
        run: cd docs && bun install --frozen-lockfile

      - name: Build
        run: cd docs && bun run build

      - name: Upload Artifacts
        # Only the deploy jobs consume this, and they run on push/dispatch.
        # Skipping the upload on PRs avoids spending Actions artifact storage on
        # builds that never deploy.
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: docs
          path: docs/.vuepress/dist
          retention-days: 1

  deploy-static-pages:
    runs-on: ubuntu-latest
    needs:
      - build
      - md
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    permissions:
      id-token: write
      pages: write
    steps:
      - name: Download Artifacts for Website
        uses: actions/download-artifact@v8
        with:
          name: docs
          path: ./dist

      - name: Upload to Static Pages
        uses: SpechtLabs/StaticPages-Upload@main
        with:
          endpoint: https://pages.specht-labs.de
          site-dir: dist/

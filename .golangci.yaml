# golangci-lint configuration for kush.
#
# golint-sl runs as a module plugin baked into ./custom-gcl (see .custom-gcl.yml).
# The prebuilt golangci-lint cannot load the plugin, so run it with
# `mise run lint`, which builds custom-gcl and runs it.
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional recommended linters
    - dogsled
    - copyloopvar
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - whitespace
    - ginkgolinter
    - unconvert
    - unparam

    # golint-sl: production-ready Go patterns (error handling, observability, K8s, safety)
    # https://golint.specht-labs.de/
    - golint-sl

  settings:
    errcheck:
      check-type-assertions: false
      check-blank: false
    govet:
      enable-all: true
      disable:
        - fieldalignment # Too noisy for most projects
    gosec:
      excludes:
        - G204 # kush intentionally execs the user's shell / fzf with a context name
        - G302 # the private runtime dir is deliberately 0700 (owner must list it)
    misspell:
      locale: US
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    custom:
      golint-sl:
        type: module
        description: SpechtLabs Go linter collection for production-ready code
        original-url: github.com/spechtlabs/golint-sl
        settings:
          # These are architectural suggestions ("extract helpers", "abstract the
          # clock", "inject the loader") that add indirection for little gain in a
          # small single-binary CLI.
          disabled-analyzers:
            - nestingdepth
            - clockinterface
            - interfaceconsistency

  exclusions:
    generated: lax
    rules:
      # init() is the idiomatic cobra pattern for registering command flags.
      - linters:
          - gochecknoinits
        path: cmd/kush/
      # pkg/kubeconfig is a reusable library: it returns idiomatic `error` and
      # wraps at the point each error originates, so it does not adopt the
      # application's humane.Error return type or re-wrap on propagation.
      - linters:
          - golint-sl
        path: pkg/kubeconfig/
        text: (humaneerror|errorwrap)
      # shell.Exec returns the raw *exec.ExitError so the caller can read the
      # child's exit code; it cannot convert to humane.Error or wrap that path.
      - linters:
          - golint-sl
        path: internal/shell/
        text: (humaneerror|errorwrap)
      # Hold test files to a lighter bar than production code.
      - linters:
          - gosec
          - goconst
          - golint-sl
        path: _test\.go

    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

# golangci-lint configuration for golint-sl
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 10m
  tests: true
  modules-download-mode: readonly

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters:
  enable:
    # Default linters (gosimple and stylecheck are now part of staticcheck)
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional recommended linters
    # bodyclose: replaced by golint-sl's resourceclose (more comprehensive)
    - dogsled
    # dupl: disabled — builder-pattern code is naturally repetitive and not a real issue
    - copyloopvar
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - misspell
    - nakedret
    # noctx: replaced by golint-sl's contextpropagation (production-focused)
    - nolintlint
    - prealloc
    - revive
    - rowserrcheck
    - whitespace
    - ginkgolinter
    - unconvert
    - unparam

    # golint-sl: production-ready Go patterns (error handling, observability, K8s, safety)
    # https://golint.specht-labs.de/
    - golint-sl

  settings:
    errcheck:
      check-type-assertions: false # Type assertions on pass.ResultOf are safe in analyzers
      check-blank: false
    govet:
      enable-all: true
      disable:
        - fieldalignment # Too noisy for most projects
    misspell:
      locale: US
    revive:
      rules:
        - name: comment-spacings
        - name: import-shadowing
    custom:
      golint-sl:
        type: module
        description: SpechtLabs Go linter collection for production-ready code
        original-url: github.com/spechtlabs/golint-sl

  exclusions:
    generated: lax
    rules:
      # gochecknoinits: init() is standard pattern for k8s types registration
      - linters:
          - gochecknoinits
        path: api/v1alpha1/
      - linters:
          - gochecknoinits
        path: cmd/main.go
      # Exclude test files from security and context linters
      - linters:
          - gosec
          - golint-sl
        path: ".*test.*"
      # Exclude testdata directory from most linters
      - linters:
          - gosec
          - errcheck
          - govet
          - staticcheck
          - golint-sl
        path: testdata/
      # Exclude e2e test directories
      - linters:
          - gosec
          - golint-sl
        path: "test/e2e/"
      - linters:
          - gosec
          - golint-sl
        path: "test/utils/"

    paths:
      - third_party$
      - builtin$
      - examples$

formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$

[tools]
# Go version from your go.mod file
go = "1.26.5"
"go:golang.org/x/tools/gopls" = "0.23.0"
"go:github.com/go-delve/delve/cmd/dlv" = "1.27.0"

# Pre-commit for Git hooks
pre-commit = "4.6.0"

# linter
golangci-lint = "2.12.2"
node = "24.18.0"
markdownlint-cli2 = "0.23.0"

# Kubernetes tools
kustomize = "5.8.1" # Pin version for reproducible manifest builds across tasks/CI
kind = "0.32.0"
kubectl = "1.36.2"
k9s = "0.51.0"
yq = "4.53.3"
yamllint = "1.38.0"

# doc tools
"npm:markdown-link-check" = "3.14.2"
bun = "1.3.14"
goreleaser = "2.17.0"
pipx = "1.16.0"

[tasks.build]
description = "Build the kush binary into bin/"
run = "go build -o bin/kush ./cmd/kush/"

[tasks.test]
description = "Run the test suite with race detector and coverage"
run = "go test -race -covermode=atomic -coverprofile=coverage.txt ./..."

# golint-sl runs as a golangci-lint module plugin, so it has to be compiled into
# a custom binary (./custom-gcl). Rebuilds only when .custom-gcl.yml changes.
[tasks.lint-build]
description = "Build the custom-gcl binary with the golint-sl plugin baked in"
run = "golangci-lint custom"
sources = [".custom-gcl.yml"]
outputs = ["custom-gcl"]

[tasks.lint]
description = "Lint the module with golangci-lint and the golint-sl plugin"
depends = ["lint-build"]
run = "./custom-gcl run ./..."

[tasks."nix:update-hash"]
description = "Regenerate vendorHash in package.nix after a go.sum change"
run = '''
  output=$(nix build --no-link 2>&1)
  if [ $? -eq 0 ]; then
    echo "Build succeeded — vendorHash is already correct."
    exit 0
  fi

  got=$(printf '%s' "$output" | grep -oE 'got:\s*sha256-[A-Za-z0-9+/=]+' | awk '{print $2}')
  if [ -z "$got" ]; then
    echo "$output" >&2
    echo "Build failed for a reason other than a vendorHash mismatch." >&2
    exit 1
  fi

  sed -i "s|vendorHash = \".*\";|vendorHash = \"$got\";|" package.nix
  echo "vendorHash updated to $got"
'''
